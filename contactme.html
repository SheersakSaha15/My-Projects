    <body>
        <div class="navbar">
            <div class="wrapper">
                <div class="trapezium"></div>
                <div class="name-logo">
                    <h1 class="name">SherShah</h1>
                    <h2 class="dot">.</h2>
                </div>
                <div class="navlinks">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="#">Contact Me</a>
                </div>
            </div>
        </div>
        <div class="heading"><p>Contact Me</p></div>
        <form class="contact-form" action="https://sheersak.1506@gmail.com" method="post" enctype="text/plain">
            <div class="left-side">
                <label for="name-input">Name <span class="ast">*</span></label>
                <input type="text" name="user_name" placeholder="Enter your name" id="name-input" required>
                <label for="dob">Date of Birth <span class="ast">*</span></label>
                <input type="date" name="date-of-birth" id="dob" required>
                <label for="email">E-mail <span class="ast">*</span></label>
                <input type="email" name="user_email" placeholder="Enter your e-mail ID" id="email" required>
            </div>
            <div class="right-side">
                <label for="message">Message <span class="ast">*</span></label>
                <textarea name="message" id="message" rows="12" cols="30" placeholder="Type your message here" required></textarea><br>
            </div>
            <div class="submit-container">
                <button type="submit">Submit</button>
            </div>
            <div class="far-right-side">
                <img src="Images/contact me page pic.png" alt="Contact Me Image" class="contact-me-pic">
            </div>
        </form>
    </body>
